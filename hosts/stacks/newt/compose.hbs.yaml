services:
  newt:
    image: fosrl/newt:1.10.1@sha256:dc3a6ce4c290d36393a9db6662afd826260e3c8552b19359193a6b311988d3d2
    container_name: newt
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT={{{SECRET_PANGOLIN_ENDPOINT}}}
      - NEWT_ID={{{SECRET_NEWT_ID}}}
      - NEWT_SECRET={{{SECRET_NEWT_SECRET}}}
    networks:
      - traefik

networks:
  traefik:
    external: true
