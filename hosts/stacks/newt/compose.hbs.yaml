services:
  newt:
    image: fosrl/newt:1.10.3@sha256:41a269865ed59dc16a8412b292380b15bf506d2a3a386eca024ffb29e0d18cd5
    container_name: newt
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT={{{SECRET_PANGOLIN_ENDPOINT}}}
      - NEWT_ID={{{SECRET_NEWT_ID}}}
      - NEWT_SECRET={{{SECRET_NEWT_SECRET}}}
    networks:
      - traefik

networks:
  traefik:
    external: true
