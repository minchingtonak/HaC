    restart: unless-stopped
    user: "${PUID}:${PGID}"
    # ports:
    #   - "5001:5001"
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "/repo/entrypoint_user_scripts.sh && exec /repo/entrypoint.sh",
      ]
    environment:
      TZ: "{{{global:TIMEZONE}}}"
    volumes:
      - ${BEETS_CONFIG_DIR}:/config
      # - ${BEETS_CONFIG_PATH}:/config/beets/config.yaml
      # - ${BEETS_REQ_PATH}:/config/beets/requirements.txt
      # for music folders, match paths inside and out of container!
      - /mnt/media/beets-test/inbox/:/mnt/media/beets-test/inbox/
      - /mnt/media/beets-test/clean/:/mnt/media/beets-test/clean/
    labels:
      - traefik.enable=true
      - traefik.http.routers.beets-flask.rule=Host(`{{{domainForApp "beets-flask"}}}`)
      - traefik.http.routers.beets-flask.entrypoints=https
      - traefik.http.routers.beets-flask.tls=true
      - traefik.http.routers.beets-flask.tls.certresolver=porkbun
      - traefik.http.routers.beets-flask.service=beets-flask
      - traefik.http.services.beets-flask.loadbalancer.server.port=5001
      - traefik.http.routers.beets-flask.middlewares=oidc-auth@file
    networks:
      - traefik

networks:
  traefik:
    external: true
